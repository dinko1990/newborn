<!DOCTYPE html> <html lang="he" dir="rtl"> <head> <meta charset="UTF-8" /> <title>מעקב יילוד</title> <!-- React --> <script src="https://unpkg.com/react@18/umd/react.development.js"></script> <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> <!-- Babel (so JSX works in browser) --> <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <style> body { font-family: Arial; background: #f8fafc; padding: 20px; direction: rtl; } h1 { font-size: 32px; } .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; } .btn { padding: 20px; border-radius: 16px; border: none; cursor: pointer; font-size: 18px; width: 140px; } .feeding { background: #ffe4e6; } .poop { background: #fef3c7; } .sleep { background: #e0f2fe; } .exception { background: #ede9fe; } .card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); } </style> </head> <body> <h1>מעקב יילוד</h1> <div id="root"></div> <script type="text/babel"> function App() { const [events, setEvents] = React.useState([]); function addEvent(type) { const newEvent = { type, time: new Date().toLocaleString("he-IL") }; setEvents([newEvent, ...events]); } return ( <div> <div className="buttons"> <button className="btn feeding" onClick={() => addEvent("אוכל")}>אוכל</button> <button className="btn poop" onClick={() => addEvent("קקי")}>קקי</button> <button className="btn sleep" onClick={() => addEvent("שינה")}>שינה</button> <button className="btn exception" onClick={() => addEvent("אירוע חריג")}>חריג</button> </div> <h2>לוגים</h2> {events.length === 0 && <p>אין נתונים עדיין</p>} {events.map((e, i) => ( <div key={i} className="card"> <strong>{e.type}</strong> <div>{e.time}</div> </div> ))} </div> ); } const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<App />); </script> </body> </html> :::
